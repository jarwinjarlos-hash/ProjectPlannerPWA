<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Project Planner</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Project Planner (Engineering Style)</h1>

<div class="controls">
  <input id="taskName" placeholder="Task Name">
  <input type="date" id="startDate">
  <input type="date" id="endDate">
  <button onclick="addTask()">Add Task</button>
</div>

<div class="container">

  <!-- LEFT TABLE -->
  <table id="taskTable">
    <thead>
      <tr>
        <th>Task</th>
        <th>Start</th>
        <th>End</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- RIGHT TIMELINE -->
  <div id="timeline"></div>

</div>

<script src="app.js"></script>
</body>
</html>
